# verify-matrix.toml
#
# Every tuple that must be green before we ship a release.
# Read by scripts/verify-all.sh. Each `[[case]]` runs independently.
#
# A case is SKIPPED (not failed) when all of its `requires_env` vars are unset.
# A case is FAILED when any step fails while its env vars are present.
#
# Fields per case:
#   id              unique id; also used as the sub-directory name for logs
#   demo            demo directory under examples/demos
#   sync            argv passed to `appctl sync` inside the demo copy
#   provider_name   name used inside appctl for this provider
#   provider_kind   one of: google_genai | vertex | open_ai_compatible | anthropic | azure_open_ai
#   auth_kind       one of: api_key | google_adc | azure_ad | mcp_bridge | none
#   base_url        base URL to write into config.toml
#   model           model id to write into config.toml
#   secret_env      env var that holds the real API key, when auth_kind = "api_key"
#   secret_ref      keychain name to store the secret under
#   prompt          the real prompt sent by `appctl run`
#   requires_env    env vars that must be set for this case to run
#   extra_headers   optional key=value lines added to the provider block

[[case]]
id = "openapi-fastapi+openai-api-key"
demo = "openapi-fastapi"
sync = ["sync", "--openapi", ".", "--base-url", "http://127.0.0.1:8000"]
provider_name = "openai"
provider_kind = "open_ai_compatible"
auth_kind = "api_key"
base_url = "https://api.openai.com/v1"
model = "gpt-4.1-mini"
secret_env = "OPENAI_API_KEY"
secret_ref = "OPENAI_API_KEY"
prompt = "Reply with the single token 'ok'."
requires_env = ["OPENAI_API_KEY"]

