# MCP bridge cases only assert that `appctl init` wrote the right config into
# the external client and that the external binary can at least print --help.
# They do not do a real subscription call in CI because doing so would
# require real paid accounts and interactive login.

[[case]]
id = "mcp-bridge+codex"
demo = "mcp-stdio"
sync = ["sync", "--mcp-stdio", ".", "--base-url", "http://127.0.0.1:1"]
provider_name = "openai-subscription"
provider_kind = "open_ai_compatible"
auth_kind = "mcp_bridge"
bridge_client = "codex"
smoke_only = true
requires_env = ["APPCTL_LIVE_MCP_BRIDGE"]

[[case]]
id = "mcp-bridge+claude-code"
