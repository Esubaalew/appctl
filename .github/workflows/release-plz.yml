name: release-plz

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

# Keep JS actions on the same Node major as `ci.yml` (Astro/docs expect >=22; runners deprecate 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-plz:
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build embedded web UI
        working-directory: web
        run: npm ci && npm run build
      - name: Vendor web UI into appctl crate (required for crates.io tarball)
        run: rm -rf crates/appctl/embedded-web/dist && mkdir -p crates/appctl/embedded-web && cp -R web/dist crates/appctl/embedded-web/dist
      # Vite re-hashes bundle names: the tree is dirty after the copy. Pairs with
      # [workspace] allow_dirty in release-plz.toml; we also pass --allow-dirty on the CLI
      # so `release-pr` (UpdateRequest) always allows the embedded bundle before `next_versions`.
      - name: Install cargo-semver-checks and release-plz
        uses: taiki-e/install-action@f23382d582832e41d5eb4fff2bddb06bc5adf8d3
        with:
          tool: cargo-semver-checks@0.46,release-plz@0.3.157
      - name: Configure git user for release-plz
        uses: release-plz/git-config@59144859caf016f8b817a2ac9b051578729173c4
      - name: Run release-plz (release-pr + release)
        id: release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail
          # release-pr: same 422 no-op handling as MarcoIeni/release-plz-action@v0.5
          echo "-- Running release-plz release-pr --"
          release_pr_stderr=$(mktemp)
          if ! release_pr_output=$(release-plz release-pr \
            --config release-plz.toml \
            --git-token "${GITHUB_TOKEN}" \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
            --allow-dirty \
            -v \
            -o json 2>"$release_pr_stderr")
          then
            release_pr_error=$(cat "$release_pr_stderr")
            if [[ "$release_pr_error" == *"422"* ]]; then
              echo "::warning::release-plz release-pr failed with HTTP 422; continuing with no PRs created."
              release_pr_output='{"prs":[]}'
            else
              echo "$release_pr_error" >&2
              rm -f "$release_pr_stderr"
              exit 1
            fi
          fi
          rm -f "$release_pr_stderr"
          echo "release_pr_output: $release_pr_output"
          prs=$(echo "$release_pr_output" | jq -c .prs)
          echo "prs=$prs" >> "$GITHUB_OUTPUT"
          prs_length=$(echo "$prs" | jq 'length')
          if [ "$prs_length" != "0" ]; then
            prs_created=true
            first_pr=$(echo "$prs" | jq -c '.[0]')
          else
            prs_created=false
            first_pr="{}"
          fi
          echo "pr=$first_pr" >> "$GITHUB_OUTPUT"
          echo "prs_created=$prs_created" >> "$GITHUB_OUTPUT"
          # release: --allow-dirty forces cargo publish --allow-dirty for the embedded dist
          echo "-- Running release-plz release --"
          release_output=$(release-plz release \
            --config release-plz.toml \
            --git-token "${GITHUB_TOKEN}" \
            --allow-dirty \
            -v \
            -o json)
          echo "release_output: $release_output"
          releases=$(echo "$release_output" | jq -c .releases)
          echo "releases=$releases" >> "$GITHUB_OUTPUT"
          releases_length=$(echo "$releases" | jq 'length')
          if [ "$releases_length" != "0" ]; then
            releases_created=true
          else
            releases_created=false
          fi
          echo "releases_created=$releases_created" >> "$GITHUB_OUTPUT"
