name: release-plz

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  require-live-providers:
    name: Require live-providers green on this SHA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Block the publish flow unless the live-providers workflow has
            // a successful run for the exact commit we're about to release.
            const { owner, repo } = context.repo;
            const ref = context.sha;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                head_sha: ref,
                per_page: 100,
              }
            );
            const match = runs.find(
              r => r.name === 'live-providers' && r.conclusion === 'success'
            );
            if (!match) {
              core.setFailed(
                `No successful live-providers run found for ${ref}. ` +
                `Trigger the live-providers workflow on this SHA and wait ` +
                `for it to pass before release-plz can open a publish PR.`
              );
            } else {
              core.info(`live-providers run ${match.id} is green for ${ref}.`);
            }

  release-plz:
    needs: require-live-providers
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build embedded web UI
        working-directory: web
        run: npm ci && npm run build
      - name: Vendor web UI into appctl crate (required for crates.io tarball)
        run: rm -rf crates/appctl/embedded-web/dist && mkdir -p crates/appctl/embedded-web && cp -R web/dist crates/appctl/embedded-web/dist
      - uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
