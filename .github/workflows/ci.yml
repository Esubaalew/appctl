name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  docs:
    name: docs-next build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs-next/package-lock.json
      - working-directory: docs-next
        run: |
          npm ci
          npm run build

  web:
    name: web (build, lint, typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: |
          npm ci
          npm run build
          npm run typecheck
          npm run lint

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    needs: [web]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Build embedded web UI
        working-directory: web
        run: npm ci && npm run build
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    needs: [web]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build embedded web UI
        working-directory: web
        run: npm ci && npm run build
      - run: cargo test --workspace --all-features

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: extensions/vscode/package-lock.json
      - working-directory: extensions/vscode
        run: |
          npm ci
          npm run compile
          npx vsce package --no-yarn --no-dependencies -o appctl-vscode.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: appctl-vscode
          path: extensions/vscode/*.vsix

  validate-demos:
    name: validate static demo syncs
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build embedded web UI
        working-directory: web
        run: npm ci && npm run build
      - name: Build and install appctl
        run: cargo install --path crates/appctl --locked
      - name: Run static demo sync validation
        run: bash scripts/validate-demos.sh --force
